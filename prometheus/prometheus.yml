global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: core
    metrics_path: /metrics
    static_configs:
      - targets: ["core:8020"]

  - job_name: llm-service
    metrics_path: /metrics
    static_configs:
      - targets: ["llm-service:8001"]
